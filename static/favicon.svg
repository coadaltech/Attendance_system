<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#17184B"/>
  <defs>
    <!-- Lime to purple gradient matching COADAL brand -->
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8E63C"/>
      <stop offset="100%" stop-color="#D6B4FC"/>
    </linearGradient>
  </defs>
  <!-- C shape: arc from upper-right sweeping counterclockwise to lower-right -->
  <!-- Center (16,16), radius 9, opening on the right -->
  <path d="M22 10 A9 9 0 1 0 22 22"
        stroke="url(#g)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Lime accent dot at top tip of C -->
  <circle cx="22" cy="10" r="1.5" fill="#D8E63C"/>
</svg>
